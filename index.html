<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rent Split Board</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f4ef;
        --ink: #1d2430;
        --muted: #657080;
        --line: #d8dde4;
        --blue: #255f85;
        --blue-dark: #17415f;
        --red: #a84444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(520px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 50px rgba(29, 36, 48, 0.12);
        padding: clamp(22px, 6vw, 38px);
      }
      p:first-child {
        margin: 0 0 8px;
        color: var(--blue);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(30px, 9vw, 46px);
        line-height: 1;
        letter-spacing: 0;
      }
      .copy {
        margin: 0 0 22px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
      }
      form { display: grid; gap: 12px; }
      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }
      input {
        width: 100%;
        height: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        color: var(--ink);
        font: inherit;
        outline: none;
      }
      input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(37, 95, 133, 0.16);
      }
      button {
        min-height: 48px;
        border: 1px solid transparent;
        border-radius: 8px;
        background: var(--blue);
        color: #fff;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }
      button:hover { background: var(--blue-dark); }
      .error {
        min-height: 20px;
        margin: 2px 0 0;
        color: var(--red);
        font-size: 13px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Rent Split Board</p>
      <h1>Private room split</h1>
      <p class="copy">Enter the shared passphrase to open the rent-split app.</p>
      <form id="unlock-form">
        <label>
          <span>Passphrase</span>
          <input id="password" type="password" autocomplete="current-password" autofocus />
        </label>
        <button type="submit">Unlock</button>
        <p id="error" class="error" role="alert"></p>
      </form>
    </main>

      const form = document.querySelector("#unlock-form");
      const input = document.querySelector("#password");
      const error = document.querySelector("#error");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.textContent = "";
        try {
          const html = await decrypt(input.value);
          document.open();
          document.write(html);
          document.close();
        } catch {
          error.textContent = "Wrong passphrase. Check capitalization and try again.";
        }
      });

      async function decrypt(password) {
        const keyMaterial = await crypto.subtle.importKey(
          "raw",
          new TextEncoder().encode(password),
          "PBKDF2",
          false,
          ["deriveKey"],
        );
        const key = await crypto.subtle.deriveKey(
          {
            name: "PBKDF2",
            salt: base64ToBytes(payload.salt),
            iterations: 250000,
            hash: "SHA-256",
          },
          keyMaterial,
          { name: "AES-GCM", length: 256 },
          false,
          ["decrypt"],
        );
        const encrypted = base64ToBytes(payload.ciphertext);
        const tag = base64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const decrypted = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: base64ToBytes(payload.iv) },
          key,
          combined,
        );
        return new TextDecoder().decode(decrypted);
      }

      function base64ToBytes(value) {
        return Uint8Array.from(atob(value), (char) => char.charCodeAt(0));
      }
